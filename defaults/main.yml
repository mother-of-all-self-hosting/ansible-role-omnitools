---
# Project source code URL: https://github.com/iib0011/omni-tools

omnitools_enabled: true

omnitools_identifier: omnitools
omnitools_base_path: "/{{ omnitools_identifier }}"

# renovate: datasource=docker depName=iib0011/omni-tools
omnitools_version: 0.6.0

omnitools_uid: ""
omnitools_gid: ""

# The scheme used for serving OmniTools.
omnitools_scheme: https

# The hostname at which OmniTools is served.
omnitools_hostname: ""

# The path at which OmniTools is served.
# This value must either be `/` or not end with a slash (e.g. `/omnitools`).
omnitools_path_prefix: /

omnitools_container_image: "{{ omnitools_container_image_registry_prefix }}iib0011/omni-tools:{{ omnitools_container_image_tag }}"
omnitools_container_image_tag: "{{ omnitools_version }}"
omnitools_container_image_registry_prefix: "{{ omnitools_container_image_registry_prefix_upstream }}"
omnitools_container_image_registry_prefix_upstream: "{{ omnitools_container_image_registry_prefix_upstream_default }}"
omnitools_container_image_registry_prefix_upstream_default: docker.io/

omnitools_container_image_self_build: false
omnitools_container_image_self_build_name: "iib0011/omni-tools:{{ omnitools_container_image_self_build_repo_version }}"
omnitools_container_image_self_build_repo: "https://github.com/iib0011/omni-tools.git"
omnitools_container_image_self_build_repo_version: "{{ 'v' + omnitools_version if omnitools_version != 'latest' else 'main' }}"
omnitools_container_image_self_build_src_files_path: "{{ omnitools_base_path }}/docker-src"

# The base container network. It will be auto-created by this role if it doesn't exist already.
omnitools_container_network: "{{ omnitools_identifier }}"

# Control if the container network is deleted on uninstalling.
omnitools_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `omnitools_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
omnitools_container_http_host_bind_port: ""

# The port number in the container
# "8080" is set to SERVER_PORT for using the self-built image
omnitools_container_http_port: "{{ '8080' if omnitools_container_image_self_build else '80' }}"

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
omnitools_container_additional_networks: "{{ omnitools_container_additional_networks_auto + omnitools_container_additional_networks_custom }}"
omnitools_container_additional_networks_auto: []
omnitools_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
omnitools_container_additional_volumes: "{{ omnitools_container_additional_volumes_auto + omnitools_container_additional_volumes_custom }}"
omnitools_container_additional_volumes_auto: []
omnitools_container_additional_volumes_custom: []

# omnitools_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `omnitools_container_labels_additional_labels_custom`.
omnitools_container_labels_traefik_enabled: true
omnitools_container_labels_traefik_docker_network: "{{ omnitools_container_network }}"
omnitools_container_labels_traefik_hostname: "{{ omnitools_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/omnitools`).
omnitools_container_labels_traefik_path_prefix: "{{ omnitools_path_prefix }}"
omnitools_container_labels_traefik_rule: "Host(`{{ omnitools_container_labels_traefik_hostname }}`){% if omnitools_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ omnitools_container_labels_traefik_path_prefix }}`){% endif %}"
omnitools_container_labels_traefik_priority: 0
omnitools_container_labels_traefik_entrypoints: web-secure
omnitools_container_labels_traefik_tls: "{{ omnitools_container_labels_traefik_entrypoints != 'web' }}"
omnitools_container_labels_traefik_tls_certResolver: default # noqa var-naming
omnitools_container_labels_traefik_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
omnitools_container_labels_traefik_middleware_basic_auth_users: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `omnitools_container_labels_traefik_additional_request_headers_custom`
omnitools_container_labels_traefik_additional_request_headers: "{{ omnitools_container_labels_traefik_additional_request_headers_auto | combine(omnitools_container_labels_traefik_additional_request_headers_custom) }}"
omnitools_container_labels_traefik_additional_request_headers_auto: {}
omnitools_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `omnitools_container_labels_traefik_additional_response_headers_custom`
omnitools_container_labels_traefik_additional_response_headers: "{{ omnitools_container_labels_traefik_additional_response_headers_auto | combine(omnitools_container_labels_traefik_additional_response_headers_custom) }}"
omnitools_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': omnitools_http_header_xss_protection} if omnitools_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': omnitools_http_header_content_type_options} if omnitools_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': omnitools_http_header_content_security_policy} if omnitools_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': omnitools_http_header_permissions_policy} if omnitools_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': omnitools_http_header_strict_transport_security} if omnitools_http_header_strict_transport_security and omnitools_container_labels_traefik_tls else {})
  }}
omnitools_container_labels_traefik_additional_response_headers_custom: {}
# omnitools_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `omnitools_container_labels_additional_labels_custom`
#
# Example:
# omnitools_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
omnitools_container_labels_additional_labels: "{{ omnitools_container_labels_additional_labels_auto + omnitools_container_labels_additional_labels_custom }}"
omnitools_container_labels_additional_labels_auto: []
omnitools_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
omnitools_container_extra_arguments: "{{ omnitools_container_extra_arguments_auto + omnitools_container_extra_arguments_custom }}"
omnitools_container_extra_arguments_auto: []
omnitools_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
omnitools_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
omnitools_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
omnitools_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
omnitools_http_header_permissions_policy: "{{ 'interest-cohort=()' if omnitools_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
omnitools_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if omnitools_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `omnitools_http_header_permissions_policy`
omnitools_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `omnitools_http_header_strict_transport_security`
omnitools_hsts_preload_enabled: false

# List of systemd services that the OmniTools systemd service depends on
omnitools_systemd_required_services_list: "{{ omnitools_systemd_required_services_list_default + omnitools_systemd_required_services_list_auto + omnitools_systemd_required_services_list_custom }}"
omnitools_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
omnitools_systemd_required_services_list_auto: []
omnitools_systemd_required_services_list_custom: []

# List of systemd services that the OmniTools systemd service wants
omnitools_systemd_wanted_services_list: "{{ omnitools_systemd_wanted_services_list_default + omnitools_systemd_wanted_services_list_auto + omnitools_systemd_wanted_services_list_custom }}"
omnitools_systemd_wanted_services_list_default: []
omnitools_systemd_wanted_services_list_auto: []
omnitools_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
omnitools_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
omnitools_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
omnitools_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
omnitools_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ omnitools_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ omnitools_container_stop_grace_time_seconds }} {{ omnitools_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ omnitools_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ omnitools_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ omnitools_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ omnitools_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ omnitools_identifier }} after {{ omnitools_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
omnitools_environment_variables_tz: UTC

# Specify a logging level
# Valid values: debug, error, info, trace, warn
omnitools_environment_variables_server_log_level: info

omnitools_environment_variables_server_root: /var/public

# Additional environment variables.
omnitools_environment_variables_additional_variables: ""

# omnitools_restart_necessary controls whether the OmniTools systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
omnitools_restart_necessary: false
