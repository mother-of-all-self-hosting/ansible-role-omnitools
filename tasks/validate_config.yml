---
- name: Fail if required OmniTools settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - omnitools_uid
    - omnitools_gid
    - omnitools_hostname
    - omnitools_path_prefix
    - omnitools_container_network

- name: Fail if logging level of Static Web Server for OmniTools is invalid
  ansible.builtin.fail:
    msg: >-
      omnitools_environment_variables_server_log_level must be 'debug', 'error', 'info', 'trace', or 'warn'
  when: "omnitools_environment_variables_server_log_level not in ['debug', 'error', 'info', 'trace', 'warn']"

- name: Run if Traefik is enabled
  when: omnitools_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for OmniTools are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - omnitools_container_labels_traefik_hostname
        - omnitools_container_labels_traefik_path_prefix

    - name: Fail if omnitools_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          omnitools_container_labels_traefik_path_prefix (`{{ omnitools_container_labels_traefik_path_prefix }}`) must be `/`.
          OmniTools does not support hosting under a subpath yet.
      when: "omnitools_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `omnitools_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if omnitools_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          omnitools_container_labels_traefik_path_prefix (`{{ omnitools_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/omnitools`).
      when: "omnitools_container_labels_traefik_path_prefix != '/' and omnitools_container_labels_traefik_path_prefix[-1] == '/'"
